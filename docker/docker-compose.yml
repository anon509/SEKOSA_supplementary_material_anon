services:
  sekosa:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sekosa-container
    ports:
      - "1729:1729"
    volumes:
      # Mount parent directory to /workspace for output files
      - ..:/workspace
      # For X11 display (optional, for matplotlib visualization)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
    networks:
      - sekosa-network

networks:
  sekosa-network:
    driver: bridge
